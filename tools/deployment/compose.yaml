# Base configuration for staging/production
# Usage: docker compose -f compose.yaml -f <env>.compose.yaml up -d --build
services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rewriter}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-rewriter}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rewriter} -d ${POSTGRES_DB:-rewriter}"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ../..
      dockerfile: apps/server/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-rewriter}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-rewriter}
    depends_on:
      postgres:
        condition: service_healthy

  dashboard:
    build:
      context: ../..
      dockerfile: apps/dashboard/Dockerfile
    restart: unless-stopped
    depends_on:
      - server
