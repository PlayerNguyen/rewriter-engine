services:
  postgres:
    image: postgres:18-alpine
    container_name: rewriter-postgres-dev
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rewriter}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rewriter_secret}
      POSTGRES_DB: ${POSTGRES_DB:-rewriter}
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rewriter} -d ${POSTGRES_DB:-rewriter}"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: rewriter-adminer-dev
    restart: unless-stopped
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    depends_on:
      - postgres

volumes:
  postgres_dev_data:
