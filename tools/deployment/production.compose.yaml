# Production overrides
services:
  postgres:
    container_name: rewriter-postgres-prod
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data

  server:
    container_name: rewriter-server-prod
    ports:
      - "3001:3001"

  dashboard:
    container_name: rewriter-dashboard-prod
    ports:
      - "80:80"

volumes:
  postgres_prod_data:
