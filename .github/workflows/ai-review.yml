name: AI PR Review

on:
  pull_request:
    types: [opened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review (leave empty to auto-detect)"
        required: false

permissions:
  pull-requests: write
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Determine PR number
        id: pr
        run: |
          if [ -n "${{ github.event.inputs.pr_number }}" ]; then
            echo "number=${{ github.event.inputs.pr_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine model
        id: model
        run: |
          MODEL="${OPENCODE_REVIEW_MODEL:-opencode-go/mimo-v2.5}"
          echo "value=$MODEL" >> "$GITHUB_OUTPUT"

      - uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_GO_API_KEY: ${{ secrets.OPENCODE_GO_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: ${{ steps.model.outputs.value }}
          use_github_token: true
          prompt: |
            Load the pr-review skill and review PR #${{ steps.pr.outputs.number }}.
            The gh CLI is authenticated via GITHUB_TOKEN.
            Post the review using gh pr review --comment.
