name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review (leave empty to auto-detect)"
        required: false

permissions:
  id-token: write
  contents: read
  pull-requests: write
  issues: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Determine PR number
        id: pr
        if: github.event_name == 'workflow_dispatch'
        run: echo "number=${{ github.event.inputs.pr_number }}" >> "$GITHUB_OUTPUT"

      - uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_GO_API_KEY: ${{ secrets.OPENCODE_GO_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: opencode-go/deepseek-v4-flash
          use_github_token: true
          prompt: |
            Load the pr-review skill and review PR #${{ steps.pr.outputs.number || github.event.pull_request.number }}.
            The gh CLI is authenticated via GITHUB_TOKEN.
            Post the review using gh pr review --comment.
