services:
  postgres:
    image: postgres:18-alpine
    container_name: rewriter-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rewriter}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rewriter_secret}
      POSTGRES_DB: ${POSTGRES_DB:-rewriter}
    volumes:
      - .appdata/db:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rewriter} -d ${POSTGRES_DB:-rewriter}"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: rewriter-server
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-rewriter}:${POSTGRES_PASSWORD:-rewriter_secret}@postgres:5432/${POSTGRES_DB:-rewriter}
    depends_on:
      postgres:
        condition: service_healthy

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    container_name: rewriter-dashboard
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - server
